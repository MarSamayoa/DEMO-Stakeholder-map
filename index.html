<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stakeholder Mapping Tool</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#fafafa;min-height:100vh;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState, useMemo, useRef, useEffect, useCallback} = React;

var TYPES = [
  {id:"individual", label:"Individuals", shape:"cf", grp:"Individuals"},
  {id:"organisation", label:"Organisations", shape:"so", grp:"Organisations"},
  {id:"team", label:"Teams / Departments", shape:"sf", grp:"Teams"},
  {id:"community", label:"Communities", shape:"co", grp:"Communities"},
  {id:"government", label:"Government / Regulators", shape:"tf", grp:"Government"},
  {id:"investor", label:"Investors / Funders", shape:"df", grp:"Investors"},
  {id:"partner", label:"Partners / Alliances", shape:"do", grp:"Partners"},
];
function typeToGroup(ty){var t=TYPES.find(function(x){return x.id===ty;});return t?t.grp:"Other";}
var INF=[{v:1,l:"Low"},{v:2,l:"Moderate"},{v:3,l:"High"},{v:4,l:"Very High"}];
var COLORS=["#0072B2","#E69F00","#009E73","#CC79A7","#56B4E9","#D55E00","#F0E442","#000000","#8C564B","#377EB8","#984EA3","#FF7F00","#A65628","#4DAF4A","#E41A1C","#66C2A5","#FC8D62","#8DA0CB","#E78AC3","#A6D854"];

var XI={p:[
  {id:"xp1",l:"Strategic awareness",d:"Understands the broader context, risks, and opportunities of the initiative"},
  {id:"xp2",l:"Adaptability",d:"Willing to adjust position or approach as circumstances evolve"},
  {id:"xp3",l:"Forward-looking orientation",d:"Focused on future outcomes rather than preserving the status quo"}
],n:[
  {id:"xn1",l:"Status quo preference",d:"Prefers existing arrangements and resists change"},
  {id:"xn2",l:"Risk aversion",d:"Prioritises stability and avoidance of uncertainty"},
  {id:"xn3",l:"Narrow framing",d:"Views the initiative only through their immediate concerns"}
]};

var YI={p:[
  {id:"yp1",l:"Active engagement",d:"Willing to invest time, resources, or political capital"},
  {id:"yp2",l:"Coalition-building",d:"Seeks to align with others and build collective support"},
  {id:"yp3",l:"Resource commitment",d:"Backs position with funding, staffing, or material support"}
],n:[
  {id:"yn1",l:"Passive stance",d:"Observes but does not actively participate or contribute"},
  {id:"yn2",l:"Obstructive behaviour",d:"Actively works to block, delay, or undermine progress"},
  {id:"yn3",l:"Withdrawal tendency",d:"Disengages or opts out rather than participating"}
]};

var QUADRANTS=[
  {id:"tl",name:"Engaged Supporters",core:"High support, traditional outlook.",desc:"Stakeholders who are actively supportive of the initiative and willing to invest resources and effort, but whose perspective is anchored in established methods and proven approaches. They prefer incremental improvement over radical change. They are reliable allies who can be counted on for consistent backing, though they may need encouragement to embrace novel strategies. Engage them by demonstrating continuity with existing values while introducing innovation gradually."},
  {id:"tr",name:"Change Champions",core:"High support, progressive outlook.",desc:"Stakeholders who combine strong engagement with a forward-looking, adaptive worldview. They embrace innovation, seek new partnerships, and are willing to experiment with new approaches. These are the initiative's most valuable advocates for transformation. They can drive momentum and inspire others. Empower them with leadership roles, give them platforms to advocate for the vision, and connect them with other champions to amplify their impact."},
  {id:"br",name:"Pragmatic Observers",core:"Low engagement, progressive outlook.",desc:"Stakeholders who understand the need for change and recognise shifting dynamics, but choose not to engage deeply. They may be sympathetic to the initiative's goals but prefer to watch from the sidelines, engage on their own terms, or hedge their involvement. They are not opponents but cannot be relied upon for consistent support. Win them over by demonstrating tangible early results and reducing the perceived cost or risk of their participation."},
  {id:"bl",name:"Resistant Sceptics",core:"Low engagement, traditional outlook.",desc:"Stakeholders who prefer the status quo and are disinclined to engage with the initiative. They may view it as unnecessary, misguided, or threatening to their interests. While they may not actively obstruct, their inertia can slow progress and their influence on others should not be underestimated. Manage them by understanding their concerns, addressing legitimate objections, and ensuring they do not become active blockers."}
];

var OV_TEXT="This tool maps stakeholders along two dimensions to reveal patterns in how different actors relate to an initiative, project, or strategic change. It helps identify who your champions are, where resistance may come from, and which stakeholders could be moved with the right engagement strategy.";
var OV_USES=["Identify supporters, sceptics, and swing stakeholders","Reveal clusters and potential coalitions","Track shifts in stakeholder positioning over time","Inform engagement and communication strategies"];
var OV_NOTE="The map is a snapshot and should be updated as stakeholder positions evolve. It does not measure support in simple binary terms but maps nuanced positioning across multiple dimensions.";

var SEED=[
  {id:"a1",n:"CEO",ty:"individual",inf:4,c:"#0072B2",xp:[4,4.5,4.5],xn:[1,1,1],yp:[4.5,4,4],yn:[1,1,1],lo:1,note:"Strong advocate for change. Champions the initiative publicly and allocates executive resources.",src:"Board presentations, town halls"},
  {id:"a2",n:"CFO",ty:"individual",inf:3,c:"#E69F00",xp:[2.5,2,3],xn:[3,3,2.5],yp:[2.5,2,2],yn:[3,2.5,3],lo:-1,note:"Cautious about costs. Supportive in principle but consistently pushes back on budget implications.",src:"Finance reviews, steering committee"},
  {id:"a3",n:"Head of Operations",ty:"individual",inf:3,c:"#009E73",xp:[3.5,3,3],xn:[2,2.5,2],yp:[4,3.5,3.5],yn:[1,1.5,1],lo:1,note:"Pragmatic supporter. Focused on execution feasibility and resource planning.",src:"Ops meetings, project reviews"},
  {id:"a4",n:"Board of Directors",ty:"team",inf:4,c:"#CC79A7",xp:[3,2.5,3.5],xn:[2.5,2.5,2],yp:[3,2.5,3],yn:[2,2,1.5],lo:-1,note:"Generally supportive but risk-averse. Requires clear ROI justification before approving major changes.",src:"Board minutes, governance reports"},
  {id:"a5",n:"Marketing Department",ty:"team",inf:2,c:"#56B4E9",xp:[4.5,4,4.5],xn:[1,1,1],yp:[4.5,4.5,4],yn:[1,1,1],lo:1,note:"Enthusiastic about the initiative's potential. Keen to lead on external communications.",src:"Marketing plans, team standups"},
  {id:"a6",n:"IT Department",ty:"team",inf:3,c:"#D55E00",xp:[3,3.5,3],xn:[2,2,2.5],yp:[3.5,3,3],yn:[1.5,2,1.5],lo:-1,note:"Cautiously supportive. Concerned about technical debt and integration complexity.",src:"Tech assessments, architecture reviews"},
  {id:"a7",n:"Key Client A",ty:"organisation",inf:3,c:"#F0E442",xp:[2,1.5,2.5],xn:[3,3.5,3],yp:[2,1.5,2],yn:[3,3,2.5],lo:1,note:"Resistant to changes that affect their current workflows. Need careful change management.",src:"Client feedback sessions"},
  {id:"a8",n:"Industry Regulator",ty:"government",inf:4,c:"#8C564B",xp:[2.5,2,2],xn:[3,3,2.5],yp:[2.5,2.5,2],yn:[2,2,2.5],lo:-1,note:"Neutral to cautious. Focused on compliance requirements. Will support if governance is strong.",src:"Regulatory guidance, consultation responses"},
  {id:"a9",n:"Venture Capital Partner",ty:"investor",inf:3,c:"#377EB8",xp:[4.5,4,4],xn:[1,1,1.5],yp:[4,3.5,4],yn:[1,1.5,1],lo:1,note:"Strong backer. Views the initiative as key to valuation growth and market positioning.",src:"Investor updates, board seats"},
  {id:"a10",n:"Employee Union",ty:"community",inf:3,c:"#984EA3",xp:[1.5,2,2],xn:[3.5,3,3.5],yp:[2,2.5,2],yn:[3,2.5,3],lo:-1,note:"Concerned about job security and working conditions. Needs transparent communication.",src:"Union meetings, consultation logs"},
  {id:"a11",n:"Strategic Partner",ty:"partner",inf:3,c:"#FF7F00",xp:[3.5,3.5,4],xn:[1.5,1.5,1],yp:[3.5,3,3.5],yn:[1.5,1.5,1],lo:1,note:"Aligned on long-term vision. Co-developing complementary products and capabilities.",src:"Partnership agreements, joint roadmaps"},
  {id:"a12",n:"Local Community Group",ty:"community",inf:2,c:"#A65628",xp:[2,2.5,2],xn:[3,2.5,3],yp:[3,3.5,3],yn:[1.5,1,1.5],lo:-1,note:"Supportive of social impact elements but wary of disruption to local employment patterns.",src:"Community consultations, public forums"},
];

function CF({s,c,r}){return <svg width={s} height={s} viewBox="0 0 20 20"><circle cx="10" cy="10" r="7.5" fill={c}/>{r?<circle cx="10" cy="10" r="9.5" fill="none" stroke={c} strokeWidth=".8" strokeDasharray="2 2" opacity=".5"/>:null}</svg>;}
function CO({s,c,r}){return <svg width={s} height={s} viewBox="0 0 20 20"><circle cx="10" cy="10" r="6.5" fill="#fff" stroke={c} strokeWidth="2"/>{r?<circle cx="10" cy="10" r="9.5" fill="none" stroke={c} strokeWidth=".8" strokeDasharray="2 2" opacity=".5"/>:null}</svg>;}
function SF({s,c,r}){return <svg width={s} height={s} viewBox="0 0 20 20"><rect x="3.5" y="3.5" width="13" height="13" rx=".5" fill={c}/>{r?<rect x=".5" y=".5" width="19" height="19" rx="1" fill="none" stroke={c} strokeWidth=".8" strokeDasharray="2 2" opacity=".5"/>:null}</svg>;}
function SO({s,c,r}){return <svg width={s} height={s} viewBox="0 0 20 20"><rect x="4.5" y="4.5" width="11" height="11" rx=".5" fill="#fff" stroke={c} strokeWidth="2"/>{r?<rect x=".5" y=".5" width="19" height="19" rx="1" fill="none" stroke={c} strokeWidth=".8" strokeDasharray="2 2" opacity=".5"/>:null}</svg>;}
function DFn({s,c,r}){return <svg width={s} height={s} viewBox="0 0 20 20"><rect x="4.5" y="4.5" width="11" height="11" fill={c} transform="rotate(45 10 10)"/>{r?<rect x="1.5" y="1.5" width="17" height="17" rx=".5" fill="none" stroke={c} strokeWidth=".8" strokeDasharray="2 2" opacity=".5" transform="rotate(45 10 10)"/>:null}</svg>;}
function DOn({s,c,r}){return <svg width={s} height={s} viewBox="0 0 20 20"><rect x="5.5" y="5.5" width="9" height="9" fill="#fff" stroke={c} strokeWidth="2" transform="rotate(45 10 10)"/>{r?<rect x="1.5" y="1.5" width="17" height="17" rx=".5" fill="none" stroke={c} strokeWidth=".8" strokeDasharray="2 2" opacity=".5" transform="rotate(45 10 10)"/>:null}</svg>;}
function TF({s,c,r}){return <svg width={s} height={s} viewBox="0 0 20 20"><polygon points="10,2.5 18,17.5 2,17.5" fill={c}/>{r?<polygon points="10,0.5 19.5,19 0.5,19" fill="none" stroke={c} strokeWidth=".8" strokeDasharray="2 2" opacity=".5"/>:null}</svg>;}
function TO({s,c,r}){return <svg width={s} height={s} viewBox="0 0 20 20"><polygon points="10,3.5 17,16.5 3,16.5" fill="#fff" stroke={c} strokeWidth="2"/>{r?<polygon points="10,0.5 19.5,19 0.5,19" fill="none" stroke={c} strokeWidth=".8" strokeDasharray="2 2" opacity=".5"/>:null}</svg>;}
var SHAPES={cf:CF,co:CO,sf:SF,so:SO,df:DFn,"do":DOn,tf:TF,to:TO};
function getSh(ty){var t=TYPES.find(function(x){return x.id===ty;});return SHAPES[t?t.shape:"cf"]||CF;}
function gSz(v){return [0,14,16,18,22][v]||16;}
function gR(v){return v>=3;}
function comp(p,n){var vp=p.filter(function(s){return s>0;}),vn=n.filter(function(s){return s>0;});if(!vp.length&&!vn.length)return 2.5;var ap=vp.length?vp.reduce(function(a,b){return a+b;},0)/vp.length:0;var an=vn.length?vn.reduce(function(a,b){return a+b;},0)/vn.length:0;return Math.max(0,Math.min(5,(ap-an+5)/2));}
function getQ(x,y){if(x>=2.5&&y>=2.5)return "Change Champions";if(x<2.5&&y>=2.5)return "Engaged Supporters";if(x<2.5&&y<2.5)return "Resistant Sceptics";return "Pragmatic Observers";}
function randColor(){return COLORS[Math.floor(Math.random()*COLORS.length)];}

function exportCSV(actors,title){var dt=new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});var h="# Created on: "+dt+"\nName,Type,Influence,Color,LabelSide,XP1,XP2,XP3,XN1,XN2,XN3,YP1,YP2,YP3,YN1,YN2,YN3,X,Y,Quadrant,Notes,Sources\n";var rows=actors.map(function(a){var px=comp(a.xp,a.xn);var py=comp(a.yp,a.yn);return ['"'+a.n+'"',a.ty,a.inf,a.c,a.lo,a.xp[0],a.xp[1],a.xp[2],a.xn[0],a.xn[1],a.xn[2],a.yp[0],a.yp[1],a.yp[2],a.yn[0],a.yn[1],a.yn[2],px.toFixed(2),py.toFixed(2),'"'+getQ(px,py)+'"','"'+(a.note||"").replace(/"/g,"'")+'"','"'+(a.src||"").replace(/"/g,"'")+'"'].join(",");});var blob=new Blob([h+rows.join("\n")],{type:"text/csv"});var url=URL.createObjectURL(blob);var lk=document.createElement("a");lk.href=url;lk.download=(title||"map").replace(/\s+/g,"-")+"-"+dt.replace(/\s+/g,"-")+".csv";lk.click();URL.revokeObjectURL(url);}

function parseCSVImport(text){
  var lines=text.split("\n").filter(function(l){return l.trim();});
  if(lines.length<2)return null;
  var header=lines[0].split(",").map(function(h){return h.trim().toLowerCase();});
  var nameIdx=header.indexOf("name");
  var tyIdx=header.indexOf("type");
  var infIdx=header.indexOf("influence");
  var cIdx=header.indexOf("color");
  var loIdx=header.indexOf("labelside");
  var xp1=header.indexOf("xp1"),xp2=header.indexOf("xp2"),xp3=header.indexOf("xp3");
  var xn1=header.indexOf("xn1"),xn2=header.indexOf("xn2"),xn3=header.indexOf("xn3");
  var yp1=header.indexOf("yp1"),yp2=header.indexOf("yp2"),yp3=header.indexOf("yp3");
  var yn1=header.indexOf("yn1"),yn2=header.indexOf("yn2"),yn3=header.indexOf("yn3");
  var noteIdx=header.indexOf("notes");
  var srcIdx=header.indexOf("sources");
  if(nameIdx<0||xp1<0)return null;
  var actors=[];
  for(var i=1;i<lines.length;i++){
    var parts=[];var cur="";var inQ=false;
    for(var j=0;j<lines[i].length;j++){
      var ch=lines[i][j];
      if(ch==='"'){inQ=!inQ;}
      else if(ch===","&&!inQ){parts.push(cur);cur="";}
      else{cur+=ch;}
    }
    parts.push(cur);
    if(!parts[nameIdx]||!parts[nameIdx].trim())continue;
    actors.push({
      id:"csv"+Date.now()+"_"+i,
      n:parts[nameIdx].trim(),
      ty:parts[tyIdx]?parts[tyIdx].trim():"individual",
      inf:infIdx>=0?Number(parts[infIdx])||2:2,
      c:cIdx>=0&&parts[cIdx]?parts[cIdx].trim():randColor(),
      lo:loIdx>=0?Number(parts[loIdx])||1:1,
      xp:[Number(parts[xp1])||0,Number(parts[xp2])||0,Number(parts[xp3])||0],
      xn:[Number(parts[xn1])||0,Number(parts[xn2])||0,Number(parts[xn3])||0],
      yp:[Number(parts[yp1])||0,Number(parts[yp2])||0,Number(parts[yp3])||0],
      yn:[Number(parts[yn1])||0,Number(parts[yn2])||0,Number(parts[yn3])||0],
      note:noteIdx>=0?parts[noteIdx]||"":"",
      src:srcIdx>=0?parts[srcIdx]||"":""
    });
  }
  return actors.length>0?actors:null;
}

function exportImage(mapEl,title){
  if(!mapEl)return;
  var dt=new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
  var wrap=document.createElement("div");
  wrap.style.cssText="position:fixed;top:-9999px;left:-9999px;background:#fff;padding:50px 160px 30px;overflow:visible;";
  var clone=mapEl.cloneNode(true);
  clone.style.margin="0";
  clone.style.overflow="visible";
  wrap.appendChild(clone);
  var stamp=document.createElement("div");
  stamp.style.cssText="text-align:right;font-size:10px;color:#999;font-family:Helvetica Neue,Arial,sans-serif;padding:12px 0 0;";
  stamp.textContent="Created on: "+dt;
  wrap.appendChild(stamp);
  document.body.appendChild(wrap);
  function doRender(){
    window.html2canvas(wrap,{backgroundColor:"#ffffff",scale:2,logging:false}).then(function(canvas){
      document.body.removeChild(wrap);
      var link=document.createElement("a");
      link.download=(title||"stakeholder-map").replace(/\s+/g,"-")+"-"+dt.replace(/\s+/g,"-")+".png";
      link.href=canvas.toDataURL("image/png");
      link.click();
    }).catch(function(){document.body.removeChild(wrap);});
  }
  if(window.html2canvas){doRender();}
  else{var s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";s.onload=doRender;document.head.appendChild(s);}
}

/* === MAP GRID === */
function QuadLabel({qid,pos,onQuadClick}){
  var q=QUADRANTS.find(function(x){return x.id===qid;});
  if(!q)return null;
  var isTop=pos.indexOf("top")>=0;var isLeft=pos.indexOf("left")>=0;
  var bst={position:"absolute",fontSize:12,fontWeight:700,color:"#999",lineHeight:1.25,cursor:"pointer",zIndex:15};
  if(isTop)bst.top=12;else bst.bottom=12;
  if(isLeft)bst.left=12;else{bst.right=12;bst.textAlign="right";}
  var parts=q.name.split(" ");
  return (
    <div style={bst} onClick={function(){if(onQuadClick)onQuadClick(q);}}>
      <span style={{borderBottom:"1px dashed #bbb"}}>{parts[0]}<br/>{parts.slice(1).join(" ")}</span>
    </div>
  );
}

function MapGrid({actors,onActorClick,onQuadClick,mapRef}){
  var ref=useRef(null);
  var combinedRef=useCallback(function(node){ref.current=node;if(mapRef)mapRef.current=node;},[mapRef]);
  var _s=useState(400);var size=_s[0];var setSize=_s[1];
  var _m=useState(false);var mob=_m[0];var setM=_m[1];
  useEffect(function(){
    function measure(){
      if(!ref.current)return;
      var p=ref.current.parentElement;
      var w=p?p.clientWidth-80:400;
      var h=window.innerHeight-260;
      var m=window.innerWidth<700;
      setM(m);
      if(m)setSize(Math.max(240,Math.min(w,window.innerWidth-60)));
      else setSize(Math.max(300,Math.min(w,h,560)));
    }
    measure();window.addEventListener("resize",measure);
    return function(){window.removeEventListener("resize",measure);};
  },[]);
  var positions=useMemo(function(){
    var m={};actors.forEach(function(a){m[a.id]={x:comp(a.xp,a.xn),y:comp(a.yp,a.yn)};});return m;
  },[actors]);
  var labelInfo=useMemo(function(){
    var info={};
    var S=size||400;
    var placed=[];
    /* Pre-place the 4 quadrant labels as obstacles */
    placed.push({cx:0,cy:0,lx:4,ly:4,lw:100,lh:30});
    placed.push({cx:S,cy:0,lx:S-110,ly:4,lw:110,lh:30});
    placed.push({cx:0,cy:S,lx:4,ly:S-30,lw:80,lh:26});
    placed.push({cx:S,cy:S,lx:S-80,ly:S-30,lw:80,lh:26});
    var sorted=actors.map(function(a){
      var ax=positions[a.id].x;var ay=positions[a.id].y;
      var cx=(ax/5)*S;var cy=(1-ay/5)*S;
      return {id:a.id,cx:cx,cy:cy,lo:a.lo||1,nLen:(a.n||"").length};
    }).sort(function(a,b){return a.cy-b.cy;});
    sorted.forEach(function(a){
      var side=a.lo;
      var lw=a.nLen*6.5+4;
      var lh=14;
      var gap=12;
      function getRect(s,yOff){
        var lx=s===1?a.cx+gap:a.cx-gap-lw;
        var ly=a.cy-lh/2+yOff;
        return {lx:lx,ly:ly,lw:lw,lh:lh};
      }
      function collides(r){
        for(var i=0;i<placed.length;i++){
          var p=placed[i];
          if(r.lx<p.lx+p.lw&&r.lx+r.lw>p.lx&&r.ly<p.ly+p.lh&&r.ly+r.lh>p.ly)return true;
        }
        for(var j=0;j<sorted.length;j++){
          if(sorted[j].id===a.id)continue;
          var dotR=12;
          var dx=sorted[j].cx;var dy=sorted[j].cy;
          if(r.lx<dx+dotR&&r.lx+r.lw>dx-dotR&&r.ly<dy+dotR&&r.ly+r.lh>dy-dotR)return true;
        }
        return false;
      }
      var best=null;
      var sides=[side,-side];
      var yOffsets=[0,-14,14,-28,28,-42,42,-56,56,-70,70,-84,84];
      for(var si=0;si<sides.length&&!best;si++){
        for(var yi=0;yi<yOffsets.length&&!best;yi++){
          var r=getRect(sides[si],yOffsets[yi]);
          if(r.lx>=-20&&r.lx+r.lw<=S+20&&!collides(r)){
            best={side:sides[si],yN:yOffsets[yi]};
          }
        }
      }
      if(!best)best={side:side,yN:0};
      var fr=getRect(best.side,best.yN);
      placed.push({cx:a.cx,cy:a.cy,lx:fr.lx,ly:fr.ly,lw:fr.lw,lh:fr.lh});
      info[a.id]={side:best.side,yN:best.yN};
    });
    return info;
  },[actors,positions,size]);
  var fs=mob?8:11;
  var ls=mob?1.5:3;
  var lfs=mob?8:10.5;
  var mg=mob?"24px 24px":"28px 32px";

  return (
    <div ref={combinedRef} style={{width:"100%",display:"flex",justifyContent:"center"}}>
      <div style={{width:size,height:size,position:"relative",border:"2px solid #0a0a0a",background:"#fff",userSelect:"none",overflow:"visible",flexShrink:0,margin:mg}}>
        <div style={{position:"absolute",top:"-22px",left:"50%",transform:"translateX(-50%)",whiteSpace:"nowrap",fontSize:fs,fontWeight:800,letterSpacing:ls,color:"#0a0a0a",textTransform:"uppercase",background:"#fff",padding:"6px 14px",borderRadius:6,zIndex:2,boxShadow:"0 0 12px 8px #fff",display:"flex",alignItems:"center",justifyContent:"center",textAlign:"center"}}>ACTIVELY ENGAGED</div>
        <div style={{position:"absolute",bottom:"-20px",left:"50%",transform:"translateX(-50%)",whiteSpace:"nowrap",fontSize:fs,fontWeight:800,letterSpacing:ls,color:"#0a0a0a",textTransform:"uppercase",background:"#fff",padding:"6px 14px",borderRadius:6,zIndex:2,boxShadow:"0 0 12px 8px #fff",display:"flex",alignItems:"center",justifyContent:"center",textAlign:"center"}}>DISENGAGED / RESISTANT</div>

/* === MAIN APP === */
function App(){
  var _tab=useState(0);var tab=_tab[0];var setTab=_tab[1];
  var _t1=useState(SEED);var t1a=_t1[0];var setT1=_t1[1];
  var _v1=useState({});var v1=_v1[0];var sV1=_v1[1];
  var _t2=useState([]);var t2a=_t2[0];var setT2=_t2[1];

  var _ov=useState(false);var ovOpen=_ov[0];var sOv=_ov[1];

  function showToast(msg){sToast(msg);setTimeout(function(){sToast("");},2500);}

  var STORAGE_KEY="stakeholder-map-tab2";
  function saveToLocal(){
    try{
      var data={actors:t2a,title:tt2,desc:dd2,savedAt:new Date().toISOString()};

  function expandActor(c){return {id:c.i,n:c.n,ty:c.t,inf:c.f,c:c.c,lo:c.l,xp:c.xp,xn:c.xn,yp:c.yp,yn:c.yn,note:c.no||"",src:c.sr||""};}
  function shareMap(){
    var data=tab===0?t1a:t2a;var title=tab===0?"Stakeholder Map":tt2;
    if(!data.length){showToast("No stakeholders to share");return;}
    try{
      var compact={t:title,d:tab===0?"":dd2,a:data.map(compactActor)};
      var json=JSON.stringify(compact);
      var encoded=btoa(unescape(encodeURIComponent(json)));
      var url=window.location.origin+window.location.pathname+"#map="+encoded;
      if(navigator.clipboard&&navigator.clipboard.writeText){

      }else{
        var ta=document.createElement("textarea");ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
        showToast("Link copied to clipboard!");
      }
    }catch(e){showToast("Map too large for URL. Use CSV export instead.");}
  }

  useEffect(function(){
    var hash=window.location.hash;
    if(hash&&hash.indexOf("#map=")===0){
      try{
        var encoded=hash.slice(5);
        var json=decodeURIComponent(escape(atob(encoded)));
        var data=JSON.parse(json);
        if(data.a&&data.a.length){
          setT2(data.a.map(expandActor));
          if(data.t)sTt(data.t);
          if(data.d)sDd(data.d);
          setTab(1);
          window.history.replaceState(null,"",window.location.pathname);
          return;
        }
      }catch(e){console.error("Failed to parse shared map",e);}
    }
    var saved=loadFromLocal();
    if(saved&&saved.actors&&saved.actors.length){
      setT2(saved.actors);
      if(saved.title)sTt(saved.title);
      if(saved.desc)sDd(saved.desc);
      sSaved(saved.savedAt);
    }
  },[]);

  function exportJSON(){
    var data=tab===0?t1a:t2a;
    var lines=data.map(function(a){

    });
    var out="var SEED=[\n"+lines.join("\n")+"\n];";
    var blob=new Blob([out],{type:"text/plain"});
    var url=URL.createObjectURL(blob);var lk=document.createElement("a");
    lk.href=url;lk.download="stakeholder-seed.js";lk.click();URL.revokeObjectURL(url);
  }
  function doImportCSV(){
    var inp=document.createElement("input");inp.type="file";inp.accept=".csv";
    inp.onchange=function(e){
      var f=e.target.files[0];if(!f)return;
      var r=new FileReader();r.onload=function(ev){
        var actors=parseCSVImport(ev.target.result);
        if(actors){
          setT2(actors);
          var groups={};actors.forEach(function(a){groups[typeToGroup(a.ty)]=true;});
          sV2(groups);
          setTab(1);
          sTt(f.name.replace(/\.csv$/i,""));
        } else {alert("Could not parse CSV. Ensure it has Name and indicator columns (XP1-XP3, XN1-XN3, YP1-YP3, YN1-YN3).");}
      };r.readAsText(f);
    };inp.click();
  }

  function getGrps(actors){var gm={};actors.forEach(function(a){var g=typeToGroup(a.ty);if(!gm[g])gm[g]=0;gm[g]++;});return Object.keys(gm).map(function(k){return {key:k,count:gm[k]};});}
  function getVis(actors,vis){var any=Object.values(vis).some(function(v){return v;});if(!any)return [];return actors.filter(function(a){return vis[typeToGroup(a.ty)];});}

  var g1=useMemo(function(){return getGrps(t1a);},[t1a]);
  var va1=useMemo(function(){return getVis(t1a,v1);},[t1a,v1]);
  var g2=useMemo(function(){return getGrps(t2a);},[t2a]);
  var va2=useMemo(function(){return getVis(t2a,v2);},[t2a,v2]);

  function tog1(g){sV1(function(o){var n={...o};n[g]=!o[g];return n;});}
  function tog2(g){sV2(function(o){var n={...o};n[g]=!o[g];return n;});}

  function oAdd(t){sDr({id:"s"+Date.now(),n:"",ty:"individual",inf:2,c:randColor(),xp:[0,0,0],xn:[0,0,0],yp:[0,0,0],yn:[0,0,0],lo:1,note:"",src:"",_tab:t});sPn("add");}
  function oEdit(a,t){sDr({...a,xp:[...a.xp],xn:[...a.xn],yp:[...a.yp],yn:[...a.yn],_tab:t});sPn("edit");}
  function doSave(){
    if(!draft||!draft.n.trim())return;
    var t=draft._tab;var actor={...draft};delete actor._tab;
    var g=typeToGroup(actor.ty);
    if(t===1){
      setT1(function(p){var i=p.findIndex(function(a){return a.id===actor.id;});if(i>=0){var n=[...p];n[i]=actor;return n;}return [...p,actor];});
      sV1(function(o){var n={...o};n[g]=true;return n;});
    } else {
      setT2(function(p){var i=p.findIndex(function(a){return a.id===actor.id;});if(i>=0){var n=[...p];n[i]=actor;return n;}return [...p,actor];});
      sV2(function(o){var n={...o};n[g]=true;return n;});
    }
    cls();
  }
  function doDel(){
    if(!draft)return;
    if(draft._tab===1)setT1(function(p){return p.filter(function(a){return a.id!==draft.id;});});
    else setT2(function(p){return p.filter(function(a){return a.id!==draft.id;});});
    cls();
  }
  function cls(){sPn(null);sDr(null);}

  var cA=tab===0?va1:va2;
  var cG=tab===0?g1:g2;
  var cV=tab===0?v1:v2;
  var cT=tab===0?tog1:tog2;
  var anyOn=Object.values(cV).some(function(v){return v;});

  return (
    <div style={{fontFamily:"Helvetica Neue, Arial, sans-serif",background:"#fafafa",minHeight:"100vh",display:"flex",flexDirection:"column",overflow:"auto"}}>
      <header style={{padding:isMob?"10px 12px":"14px 28px 0",display:"flex",flexWrap:"wrap",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
        <div>
          <h1 style={{fontSize:isMob?20:28,fontWeight:900,letterSpacing:"-1px",margin:0,color:"#0a0a0a"}}>Stakeholder Mapping Tool</h1>
          <p style={{fontSize:isMob?10:13,fontWeight:500,color:"#666",margin:"2px 0 0",letterSpacing:"0.2px"}}>Map stakeholder positions across orientation and engagement</p>
        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          <button onClick={function(){sMe(true);}} style={{...btnSt,background:"#f3f3f3",color:"#0a0a0a"}}>Methodology</button>
          <button onClick={doImportCSV} style={{...btnSt,background:"#f3f3f3",color:"#0a0a0a"}}>Import CSV</button>
          <button onClick={function(){if(tab===0)oAdd(1);else oAdd(2);}} style={{...btnSt,background:"#0077E6",color:"#fff"}}>+ Add Stakeholder</button>
        </div>
      </header>
      <div style={{padding:isMob?"6px 12px 0":"8px 28px 0",display:"flex",gap:3}}>
        {["Example Map","Create Your Own"].map(function(t,i){var ac=tab===i;return <button key={t} onClick={function(){setTab(i);}} style={{padding:"7px 16px",borderRadius:"6px 6px 0 0",border:"none",fontSize:12,fontWeight:ac?800:500,cursor:"pointer",background:ac?"#fff":"#eee",color:ac?"#0a0a0a":"#777",borderBottom:ac?"2px solid #0077E6":"2px solid transparent",whiteSpace:"nowrap"}}>{t}</button>;})}
      </div>
      <div style={{display:"flex",flex:1,padding:isMob?"4px 8px":"0 28px 16px",gap:0,overflow:"auto",minHeight:0,flexDirection:"column"}}>
        {isMob && tab===0 ? (
          <div style={{padding:"4px 0"}}>
            <button onClick={function(){sOv(!ovOpen);}} style={{background:"none",border:"none",fontSize:11,fontWeight:700,color:"#0077E6",cursor:"pointer",padding:0}}>{ovOpen?"Hide Overview ▲":"About this tool ▼"}</button>
            {ovOpen ? <div style={{fontSize:11,color:"#0a0a0a",lineHeight:1.5,margin:"4px 0 6px"}}><p style={{margin:"0 0 4px"}}>{OV_TEXT}</p><p style={{margin:"2px 0",fontWeight:600,fontSize:10}}>It can be used to:</p>{OV_USES.map(function(u,i){return <div key={i} style={{paddingLeft:10,fontSize:10.5}}>{String.fromCharCode(8226)} {u}</div>;})}<p style={{margin:"6px 0 0",fontStyle:"italic",fontSize:10,color:"#555"}}>{OV_NOTE}</p></div> : null}
          </div>
        ) : null}
        {isMob ? (
          <div style={{padding:"4px 0",marginBottom:2}}>
          <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:4}}>
            {cG.map(function(g){return <button key={g.key} onClick={function(){cT(g.key);}} style={{padding:"4px 8px",borderRadius:4,border:cV[g.key]?"1.5px solid #0077E6":"1.5px solid #ddd",background:cV[g.key]?"#E8F0FE":"#fff",cursor:"pointer",fontSize:10,fontWeight:cV[g.key]?700:500,color:cV[g.key]?"#0077E6":"#333"}}>{g.key}</button>;})}
          </div>
          {cA.length>0 ? <div style={{display:"flex",gap:3}}>
            <button onClick={function(){exportCSV(cA,tab===0?"stakeholder-map":tt2);}} style={{...btnSt,background:"#f3f3f3",color:"#333",fontSize:10,padding:"4px 8px",flex:1}}>CSV</button>
            <button onClick={function(){exportImage(mapRef.current,tab===0?"stakeholder-map":tt2);}} style={{...btnSt,background:"#f3f3f3",color:"#333",fontSize:10,padding:"4px 8px",flex:1}}>Image</button>
            <button onClick={shareMap} style={{...btnSt,background:"#f3f3f3",color:"#333",fontSize:10,padding:"4px 8px",flex:1}}>Share</button>
            {tab===1 ? <button onClick={saveToLocal} style={{...btnSt,background:"#0077E6",color:"#fff",fontSize:10,padding:"4px 8px",flex:1}}>Save</button> : null}
          </div> : null}
          </div>
        ) : null}
        <div style={{display:"flex",flex:1,gap:0,overflow:"auto",minHeight:0}}>
        {!isMob ? (
          <aside style={{width:340,flexShrink:0,paddingRight:16,paddingTop:12,display:"flex",flexDirection:"column",gap:6,overflowY:"auto",maxHeight:"calc(100vh - 100px)"}}>
            {tab===1 ? (
              <div>
                <input value={tt2} onChange={function(e){sTt(e.target.value);}} style={{...inpSt,fontWeight:700,fontSize:14,border:"none",borderBottom:"1.5px solid #ddd",borderRadius:0,padding:"4px 0",marginBottom:4}} placeholder="Map title..."/>
                <textarea value={dd2} onChange={function(e){sDd(e.target.value);}} rows={2} style={{...inpSt,fontSize:12,border:"none",borderBottom:"1px solid #eee",borderRadius:0,padding:"4px 0",resize:"none"}} placeholder="Description..."/>
              </div>
            ) : null}
            {tab===0 && !anyOn ? (
              <div>
                <h2 style={{fontSize:20,fontWeight:900,lineHeight:1.15,letterSpacing:"-0.5px",margin:"4px 0 8px",color:"#0a0a0a"}}>About This Tool</h2>
                <div style={{fontSize:12,color:"#0a0a0a",lineHeight:1.6,margin:"0 0 10px"}}><p style={{margin:"0 0 6px"}}>{OV_TEXT}</p><p style={{margin:"4px 0 2px",fontWeight:600,fontSize:11}}>It can be used to:</p>{OV_USES.map(function(u,i){return <div key={i} style={{paddingLeft:12,fontSize:11.5,lineHeight:1.5}}>{String.fromCharCode(8226)} {u}</div>;})}<p style={{margin:"8px 0 0",fontStyle:"italic",fontSize:11,color:"#555"}}>{OV_NOTE}</p></div>
              </div>
            ) : null}
            <div style={{borderTop:"1px solid #eee",paddingTop:8}}>
              <p style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"#999",margin:"0 0 4px"}}>Overlay Groups</p>
              <div style={{display:"grid",gridTemplateColumns:cG.length>3?"1fr 1fr":"1fr",gap:2}}>
              {cG.map(function(g){return (
                <button key={g.key} onClick={function(){cT(g.key);}} style={{display:"flex",alignItems:"center",gap:6,width:"100%",padding:"5px 8px",borderRadius:5,border:cV[g.key]?"1.5px solid #0077E6":"1.5px solid #ddd",background:cV[g.key]?"#E8F0FE":"#fff",cursor:"pointer",fontSize:11,fontWeight:cV[g.key]?700:500,color:cV[g.key]?"#0077E6":"#333",textAlign:"left"}}>
                  <span style={{width:8,height:8,borderRadius:2,background:cV[g.key]?"#0077E6":"#ddd",flexShrink:0}}/>{g.key} ({g.count})
                </button>
              );})}
              </div>
              {tab===1 && t2a.length===0 ? <p style={{fontSize:11,color:"#999",margin:"8px 0"}}>Add stakeholders to start mapping</p> : null}
            </div>
            <div style={{borderTop:"1px solid #eee",paddingTop:8}}>
              <p style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"#999",margin:"0 0 4px"}}>Shape Key</p>
              {TYPES.map(function(t){var Sh=SHAPES[t.shape];return <div key={t.id} style={{display:"flex",alignItems:"center",gap:5,marginBottom:2}}><Sh s={13} c="#0a0a0a" r={false}/><span style={{fontSize:11,color:"#1a1a1a"}}>{t.label}</span></div>;})}
              <div style={{display:"flex",alignItems:"center",gap:3,marginTop:6}}>
                <span style={{fontSize:10,fontWeight:700,color:"#1a1a1a"}}>More influence</span>
                {[4,3,2,1].map(function(v){return <svg key={v} width={gSz(v)+2} height={gSz(v)+2} viewBox="0 0 20 20"><circle cx="10" cy="10" r="5" fill="#0a0a0a"/>{gR(v)?<circle cx="10" cy="10" r="8" fill="none" stroke="#0a0a0a" strokeWidth=".8" strokeDasharray="2 2" opacity=".5"/>:null}</svg>;})}
                <span style={{fontSize:10,fontWeight:700,color:"#1a1a1a"}}>Less influence</span>
              </div>
            </div>
            {cA.length>0 ? (
              <div>
                <p style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"#999",margin:"4px 0 3px"}}>Stakeholders ({cA.length})</p>
                <div style={{maxHeight:180,overflowY:"auto"}}>
                  {cA.map(function(a){var Sh=getSh(a.ty);return <div key={a.id} onClick={function(){sPop(a);}} style={{display:"flex",alignItems:"center",gap:5,padding:"3px 5px",borderRadius:4,cursor:"pointer",marginBottom:1}}><Sh s={gSz(a.inf)} c={a.c} r={gR(a.inf)}/><span style={{fontSize:11,fontWeight:600,color:"#0a0a0a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.n}</span></div>;})}
                </div>
              </div>
            ) : null}
            {cA.length>0 ? (
              <div style={{borderTop:"1px solid #eee",paddingTop:8}}>
              <p style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"#999",margin:"0 0 4px"}}>Export</p>
              <div style={{display:"flex",gap:4}}>
                <button onClick={function(){exportCSV(cA,tab===0?"stakeholder-map":tt2);}} style={{...btnSt,background:"#f3f3f3",color:"#333",fontSize:11,flex:1}}>CSV</button>
                <button onClick={function(){exportImage(mapRef.current,tab===0?"stakeholder-map":tt2);}} style={{...btnSt,background:"#f3f3f3",color:"#333",fontSize:11,flex:1}}>Map Image</button>
              </div>
              <div style={{display:"flex",gap:4,marginTop:4}}>
                <button onClick={shareMap} style={{...btnSt,background:"#f3f3f3",color:"#333",fontSize:11,flex:1}}>Share Link</button>
                <button onClick={exportJSON} style={{...btnSt,background:"#E8F0FE",color:"#0077E6",fontSize:11,flex:1}}>Export Data</button>
              </div>
              {tab===1 ? (
              <div style={{borderTop:"1px solid #eee",paddingTop:8,marginTop:8}}>
                <p style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"#999",margin:"0 0 4px"}}>Save & Restore</p>
                <div style={{display:"flex",gap:4}}>
                  <button onClick={saveToLocal} style={{...btnSt,background:"#0077E6",color:"#fff",fontSize:11,flex:1}}>Save Locally</button>
                  {savedAt ? <button onClick={clearLocal} style={{...btnSt,background:"#fff",color:"#c00",border:"1px solid #ddd",fontSize:11}}>Clear</button> : null}
                </div>
                {savedAt ? <p style={{fontSize:10,color:"#999",margin:"4px 0 0"}}>Last saved: {new Date(savedAt).toLocaleString()}</p> : null}
                <p style={{fontSize:10,color:"#999",margin:"4px 0 0",lineHeight:1.4,fontStyle:"italic"}}>Data is saved to this browser only and will not sync across devices. For permanent backup, always export CSV.</p>
              </div>
              ) : null}
              </div>
            ) : null}
          </aside>
        ) : null}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"auto"}}>
          <MapGrid actors={cA} onActorClick={function(a){sPop(a);}} onQuadClick={function(q){sQPop(q);}} mapRef={mapRef}/>
        </div>
        </div>
      </div>
      {panel ? (
        <div style={{position:"fixed",top:0,right:0,width:isMob?"100%":380,height:"100vh",background:"#fff",boxShadow:"-4px 0 20px rgba(0,0,0,.1)",zIndex:100,display:"flex",flexDirection:"column"}}>
          <div style={{padding:"14px 18px 8px",borderBottom:"1px solid #eee",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <h2 style={{fontSize:15,fontWeight:800,margin:0,color:"#0a0a0a"}}>{panel==="add"?"Add Stakeholder":"Edit Stakeholder"}</h2>
            <button onClick={cls} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#0a0a0a"}}>✕</button>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"10px 18px 80px"}}>{draft ? <EditForm d={draft} sd={sDr}/> : null}</div>
          <div style={{padding:"10px 18px",borderTop:"1px solid #eee",display:"flex",gap:6}}>
            {panel==="edit" ? <button onClick={doDel} style={{...btnSt,background:"#FEE",color:"#c00"}}>Delete</button> : null}
            <div style={{flex:1}}/>
            <button onClick={cls} style={{...btnSt,background:"#f3f3f3",color:"#333"}}>Cancel</button>
            <button onClick={doSave} disabled={!draft||!draft.n.trim()} style={{...btnSt,background:draft&&draft.n.trim()?"#0077E6":"#ccc",color:"#fff"}}>{panel==="add"?"Add":"Save"}</button>
          </div>
        </div>
      ) : null}
      {toast?<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#333",color:"#fff",padding:"10px 20px",borderRadius:8,fontSize:13,fontWeight:600,zIndex:300,boxShadow:"0 4px 12px rgba(0,0,0,.2)"}}>{toast}</div>:null}
      {quadPop ? <div onClick={function(){sQPop(null);}} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.35)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
        <div onClick={function(e){e.stopPropagation();}} style={{background:"#fff",borderRadius:12,maxWidth:480,width:"100%",maxHeight:"80vh",overflow:"auto",padding:"24px 28px",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <h2 style={{fontSize:18,fontWeight:800,margin:0,color:"#0a0a0a"}}>{quadPop.name}</h2>
            <button onClick={function(){sQPop(null);}} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#0a0a0a",marginLeft:8}}>✕</button>
          </div>
          <p style={{fontSize:12.5,color:"#0a0a0a",lineHeight:1.65,margin:"12px 0"}}>{quadPop.desc}</p>
          <div style={{padding:"8px 12px",background:"#f0f6ff",borderRadius:6,fontSize:12,fontWeight:700,color:"#0077E6",fontStyle:"italic"}}>Core orientation: {quadPop.core}</div>
        </div>
      </div> : null}
      {popA ? <ActorPopup actor={popA} onClose={function(){sPop(null);}} onEdit={function(a){oEdit(a,tab===0?1:2);}}/> : null}
      {showM ? <MethodPopup onClose={function(){sMe(false);}}/> : null}
    </div>
  );
}

var btnSt={padding:"7px 14px",borderRadius:6,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"};
var lblSt={display:"block",fontSize:11,fontWeight:700,color:"#333",textTransform:"uppercase",letterSpacing:.6,marginBottom:3,marginTop:6};
var inpSt={width:"100%",padding:"7px 10px",borderRadius:5,border:"1.5px solid #ccc",fontSize:13,color:"#1a1a1a",outline:"none",boxSizing:"border-box",fontFamily:"inherit"};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
